<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | SKI PROTECT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0B2E59 0%, #143E72 100%);
            color: #FFF;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; padding: 20px;
        }
        .container { max-width: 500px; }
        h1 { font-size: 6rem; font-weight: 900; color: #C0C0C0; line-height: 1; }
        h2 { font-size: 1.8rem; margin: 16px 0; font-weight: 700; }
        p { color: rgba(255,255,255,0.7); margin-bottom: 32px; font-size: 1.05rem; line-height: 1.6; }
        a {
            display: inline-block; padding: 14px 32px;
            background: #C0C0C0; color: #0B2E59;
            text-decoration: none; border-radius: 12px;
            font-weight: 700; font-size: 0.95rem;
            transition: all 0.3s;
        }
        a:hover { background: #FFF; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Pista no encontrada</h2>
        <p>Parece que esta ruta se salió de pista. Vuelve al inicio y sigue disfrutando.</p>
        <a href="/">Volver al Inicio</a>
    </div>
</body>
</html>
